services:

  # ─── Aplicação PHP ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: larachat
        uid: 1000
    image: larachat
    container_name: larachat_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/larachat.ini
    networks:
      - larachat
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: larachat_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - larachat
    depends_on:
      - app

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: larachat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-larachat}
      POSTGRES_USER: ${DB_USERNAME:-larachat}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - larachat
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-larachat} -d ${DB_DATABASE:-larachat}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: larachat_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - larachat
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3 local) ────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: larachat_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-larachat}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-larachat_secret}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - larachat
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Mailpit (e-mails de desenvolvimento) ───────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: larachat_mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_PORT:-1025}:1025"
      - "${MAILPIT_DASHBOARD_PORT:-8025}:8025"
    networks:
      - larachat

  # ─── Frontend Vue 3 (dev) ───────────────────────────────────────────────────
  web:
    build:
      context: ../LaraChatWeb
      dockerfile: Dockerfile.dev
    container_name: larachat_web
    restart: unless-stopped
    # porta exposta diretamente apenas para acesso sem nginx (opcional)
    # ports:
    #   - "${WEB_PORT:-5173}:3000"
    volumes:
      - ../LaraChatWeb:/app
      - /app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    networks:
      - larachat

  # ─── Horizon (worker de filas) ───────────────────────────────────────────────
  horizon:
    image: larachat
    container_name: larachat_horizon
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan horizon
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/larachat.ini
    networks:
      - larachat
    depends_on:
      - app
      - redis
    profiles:
      - workers

  # ─── Reverb (WebSocket server) ───────────────────────────────────────────────
  reverb:
    image: larachat
    container_name: larachat_reverb
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "${REVERB_PORT:-8080}:8080"
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/larachat.ini
    networks:
      - larachat
    depends_on:
      - app
      - redis
    profiles:
      - workers

networks:
  larachat:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
